<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Match 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* FIXED LAYOUT */
body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#ffb3c1,#ffe5ec);
    padding:20px;
}

/* WRAPPER */
.wrapper{
    display:flex;
    width:720px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.side{
    flex:1;
    padding:15px;
    text-align:center;
}

.side.left{
    border-right:1px solid #ffd1dc;
    background:#fff0f3;
}

.side.right{
    background:#fff7f9;
}

input, select{
    width:100%;
    padding:7px;
    margin:4px 0;
    border:2px solid #ffb3c1;
    border-radius:8px;
    outline:none;
    font-size:13px;
}

input:focus, select:focus{
    border-color:#ff4d6d;
}

img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:10px;
    margin-top:5px;
    border:2px solid #ffb3c1;
}

/* BUTTON + RESULT WRAPPER FIX */
.bottom-section{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
}

.button-container{
    display:flex;
    justify-content:center;
}

button{
    padding:10px 18px;
    border:none;
    background:#ff4d6d;
    color:white;
    font-size:14px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#e6004c;
}

.result{
    margin-top:15px;
    text-align:center;
    font-size:16px;
}

/* LOADING SCREEN */
.loading{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
}

.loader-core{
    position:relative;
    width:90px;
    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.spinner{
    width:70px;
    height:70px;
    border:4px solid #ffd1dc;
    border-top:4px solid #ff4d6d;
    border-radius:50%;
    animation:spin 1s linear infinite;
    position:absolute;
}

.heart{
    font-size:20px;
    animation:pulse 1s infinite;
    color:#ff4d6d;
    z-index:2;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.4);}
}

/* ZODIAC ORBIT */
.orbit{
    position:absolute;
    width:160px;
    height:160px;
    border-radius:50%;
    animation:spin 4s linear infinite;
}

.sign{
    position:absolute;
    font-size:16px;
    color:#ff4d6d;
    text-shadow:0 0 10px #ffb3c1;
}

.sign:nth-child(1){top:0;left:50%;}
.sign:nth-child(2){top:15%;right:0;}
.sign:nth-child(3){top:50%;right:0;}
.sign:nth-child(4){bottom:15%;right:0;}
.sign:nth-child(5){bottom:0;left:50%;}
.sign:nth-child(6){bottom:15%;left:0;}
.sign:nth-child(7){top:50%;left:0;}
.sign:nth-child(8){top:15%;left:0;}

/* FLOATING HEARTS */
.floating-heart{
    position:absolute;
    color:#ff4d6d;
    font-size:14px;
    animation:floatUp 3s linear infinite;
    opacity:0.7;
}

@keyframes floatUp{
    0%{transform:translateY(80px);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- YOU -->
    <div class="side left">
        <h3>You 💖</h3>
        <input type="text" id="name1" placeholder="Name">
        <input type="number" id="age1" placeholder="Age">
        <input type="text" id="place1" placeholder="From">

        <select id="zodiac1">
            <option>Zodiac</option>
            <option>Aries</option><option>Taurus</option><option>Gemini</option>
            <option>Cancer</option><option>Leo</option><option>Virgo</option>
            <option>Libra</option><option>Scorpio</option><option>Sagittarius</option>
            <option>Capricorn</option><option>Aquarius</option><option>Pisces</option>
        </select>

        <input type="file" onchange="loadImg(event,1)">
        <img id="img1">
    </div>

    <!-- CRUSH -->
    <div class="side right">
        <h3>Crush 💘</h3>
        <input type="text" id="name2" placeholder="Name">
        <input type="number" id="age2" placeholder="Age">
        <input type="text" id="place2" placeholder="From">

        <select id="zodiac2">
            <option>Zodiac</option>
            <option>Aries</option><option>Taurus</option><option>Gemini</option>
            <option>Cancer</option><option>Leo</option><option>Virgo</option>
            <option>Libra</option><option>Scorpio</option><option>Sagittarius</option>
            <option>Capricorn</option><option>Aquarius</option><option>Pisces</option>
        </select>

        <input type="file" onchange="loadImg(event,2)">
        <img id="img2">
    </div>

</div>

<!-- BUTTON + RESULT FIXED SECTION -->
<div class="bottom-section">
    <div class="button-container">
        <button onclick="calculateLove()">Check Love Percentage💖</button>
    </div>

    <div class="result" id="result"></div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">

    <div class="loader-core">
        <div class="spinner"></div>
        <div class="heart">💖</div>

        <div class="orbit">
            <div class="sign">♈</div>
            <div class="sign">♉</div>
            <div class="sign">♊</div>
            <div class="sign">♋</div>
            <div class="sign">♌</div>
            <div class="sign">♍</div>
            <div class="sign">♎</div>
            <div class="sign">♏</div>
        </div>
    </div>

</div>

<script>
function loadImg(event,num){
    let reader = new FileReader();
    reader.onload = function(){
        document.getElementById("img"+num).src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}

function createHearts(){
    for(let i=0;i<6;i++){
        let h=document.createElement("div");
        h.className="floating-heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"%";
        h.style.animationDuration=(2+Math.random()*2)+"s";
        document.getElementById("loading").appendChild(h);

        setTimeout(()=>h.remove(),3000);
    }
}

function calculateLove(){
    let n1=document.getElementById("name1").value;
    let n2=document.getElementById("name2").value;

    if(!n1||!n2){
        alert("Fill names muna 😅");
        return;
    }

    document.getElementById("loading").style.display="flex";
    createHearts();

    setTimeout(()=>{
        document.getElementById("loading").style.display="none";

        let percent = 72 + Math.floor(Math.random()*28);

        document.getElementById("result").innerHTML=
        `💖 <b>${n1}</b> + <b>${n2}</b><br>
        Love Match: <b>${percent}%</b> 💘<br>
        <i>"Cosmic alignment detected ✨"</i>`;
    },2600);
}
</script>

</body>
</html>
